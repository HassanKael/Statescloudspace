<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>States Cloudspace WhatsApp Support</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #scs-whatsapp-button {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(37, 211, 102, 0.4);
      transition: all 0.3s ease;
      z-index: 99999;
      border: none;
      outline: none;
    }

    #scs-whatsapp-button:hover {
      background: #20BA5A;
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(37, 211, 102, 0.5);
    }

    #scs-whatsapp-button svg {
      width: 32px;
      height: 32px;
      fill: white;
      transition: transform 0.3s ease;
    }

    #scs-whatsapp-button:hover svg {
      transform: scale(1.1);
    }

    #scs-whatsapp-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 16px;
      height: 16px;
      background: #EF4444;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.1);
      }
    }

    @media (max-width: 640px) {
      #scs-whatsapp-button {
        width: 56px;
        height: 56px;
        bottom: 20px;
        right: 20px;
      }

      #scs-whatsapp-button svg {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <button id="scs-whatsapp-button" aria-label="Chat on WhatsApp" title="Chat with us on WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <div id="scs-whatsapp-badge"></div>
  </button>

  <script>
    (function() {
      const WHATSAPP_NUMBER = '254745296323';
      const button = document.getElementById('scs-whatsapp-button');

      function openWhatsApp() {
        const message = encodeURIComponent('Hi! I need help with your digital marketing services.');
        const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
        window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
      }

      button.addEventListener('click', openWhatsApp);
    })();
  </script>
</body>
</html>
